{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Settings - SHREE</title>
    <link
      rel="stylesheet"
      href="{% static 'Shree1/css/dashboardWorker.css' %}"
    />
    <link rel="stylesheet" href="{% static 'Shree1/css/workerProfile.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo-section">
          <div class="logo-icon">S</div>
          <div>
            <h2 class="logo-name">SHREE</h2>
            <p class="logo-tagline">
              Smart Hostel Record & Employee Evaluation
            </p>
          </div>
        </div>
        <nav class="nav-menu">
          <nav class="nav-menu">
            <a href="{% url 'worker_dashboard' %}" class="nav-item"
              ><i class="fa-solid fa-table-cells-large"></i> Dashboard</a
            >
            <a href="{% url 'worker_profile' %}" class="nav-item active"
              ><i class="fa-regular fa-user"></i> Profile</a
            >
          </nav>
        </nav>
      </aside>

      <main class="main-content">
        <header class="top-header">
          <div class="user-info">
            <span class="user-name">{{ display_name }}</span>
            <span class="user-role">{{ display_role }}</span>
          </div>
        </header>

        <section class="page-header">
          <h1>Profile Settings</h1>
          <p>Manage your account information</p>
        </section>

        <div class="profile-card">
          <form class="profile-form" method="POST">
            {% csrf_token %}

            <div class="form-grid">
              <div class="form-group">
                <label>Full Name</label>
                <input
                  type="text"
                  name="full_name"
                  value="{{ full_name }}"
                  readonly
                />
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input
                  type="email"
                  name="email"
                  value="{{ email }}"
                  class="form-control"
                />
              </div>
              <div class="form-group">
                <label>Phone Number</label>
                <input
                  type="tel"
                  name="phone"
                  value="{{ phone }}"
                  maxlength="10"
                  pattern="[1-9][0-9]{9}"
                  title="Phone number must be 10 digits and cannot start with 0"
                  class="form-control"
                  required
                />
              </div>
              <div class="form-group">
                <label>Employee ID</label>
                <input
                  type="text"
                  value="{{ employee_id }}"
                  readonly
                  class="readonly"
                />
              </div>

              <div class="form-group">
                <label>Joining Date</label>
                <input
                  type="text"
                  value="{{ joining_date }}"
                  readonly
                  class="readonly"
                />
              </div>
            </div>
            <button type="submit" class="btn-primary">
              <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
          </form>
        </div>
      </main>
    </div>
    <script src="{% static 'Shree1/js/workerProfile.js' %}"></script>
  </body>
</html>
