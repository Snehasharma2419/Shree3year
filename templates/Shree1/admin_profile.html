{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile View - Admin | SHREE</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="{% static 'Shree1/css/admin_profile.css' %}" />
    <style>
        /* Locked fields ke liye extra styling */
        .form-control[readonly] {
            background-color: #f1f5f9; /* Light grey background */
            cursor: not-allowed;
            border: 1px solid #cbd5e1;
            color: #64748b;
        }
        .info-badge {
            font-size: 12px;
            color: #ef4444;
            margin-bottom: 10px;
            display: block;
        }
    </style>
  </head>

  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo-section">
          <img
            src="{% static 'Shree1/images/logo_img.jpeg' %}"
            class="nav-logo-file"
            style="
              width: 50px;
              height: 50px;
              border-radius: 8px;
              object-fit: contain;
            "
          />
          <div>
            <h2 class="logo-name">SHREE</h2>
            <p style="font-size: 10px; color: #94a3b8">
              Smart Hostel Record & Employee Evaluation
            </p>
          </div>
        </div>

        <nav class="nav-menu">
          <a href="{% url 'admin_dashboard' %}" class="nav-item">
            <i class="fa-solid fa-table-cells-large"></i> Dashboard
          </a>

          <a href="{% url 'admin_user_management' %}" class="nav-item">
            <i class="fa-solid fa-user-group"></i> User Management
          </a>

          <a href="{% url 'admin_attendance' %}" class="nav-item">
            <i class="fa-regular fa-calendar-check"></i> Attendance
          </a>

          <a href="{% url 'admin_inventory' %}" class="nav-item">
            <i class="fa-solid fa-box-open"></i> Inventory
          </a>

          <a href="{% url 'admin_leave_Management' %}" class="nav-item">
            <i class="fa-solid fa-file-contract"></i> Leave Management
          </a>

          <a href="{% url 'admin_profile' %}" class="nav-item active">
            <i class="fa-regular fa-user"></i> Profile
          </a>
          <a href="{% url 'worker_report' %}" class="nav-item">
            <i class="fa-regular fa-user"></i> Worker Report
          </a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="top-header">
          <div class="user-info">
            <span class="user-name">{{ username }}</span>
            <span class="user-role">Admin</span>
          </div>
        </header>

        <section class="page-header">
          <h1>Profile Details</h1>
          <p>View your account information</p>
        </section>

        <div class="profile-card">
          <div class="profile-form">
            

            <div class="form-grid">
              <div class="form-group">
                <label>Full Name</label>
                <input
                  type="text"
                  value="{{ username }}"
                  readonly
                  class="form-control"
                />
              </div>

              <div class="form-group">
                <label>Email Address</label>
                <input
                  type="email"
                  value="{{ email }}"
                  readonly
                  class="form-control"
                />
              </div>

              <div class="form-group">
                <label>Phone Number</label>
                <input
                  type="text"
                  value="{{ phone }}"
                  readonly
                  class="form-control"
                />
              </div>
            </div>

            </div>

          <hr class="divider" />
        </div>
      </main>
    </div>

    <script src="{% static 'Shree1/js/admin_profile.js' %}"></script>
  </body>
</html>
