{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'Shree1/css/signup.css' %}" />
    <title>Create Account - Worker</title>
    <style>
      .message-popup {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        margin-bottom: 18px;
        border-radius: 14px;
        border: 1px solid #fecaca;
        background: linear-gradient(180deg, #fff5f5 0%, #fee2e2 100%);
        box-shadow: 0 10px 24px rgba(220, 38, 38, 0.08);
        animation: popupSlideIn 0.25s ease-out;
      }
      .message-popup-icon {
        width: 34px;
        height: 34px;
        flex-shrink: 0;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #dc2626;
        color: white;
        font-weight: 700;
        font-size: 0.95rem;
        box-shadow: 0 8px 16px rgba(220, 38, 38, 0.18);
      }
      .message-popup-text {
        color: #991b1b;
        font-size: 0.95rem;
        line-height: 1.5;
        font-weight: 600;
      }
      @keyframes popupSlideIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="signup-container">
      <a
        href="{% url 'choose_signup' %}"
        style="text-decoration: none; color: #666; font-size: 1.2rem"
        >← Back</a
      >

      <h1>Create Your Account</h1>
      <p class="subtitle">Join us as a <strong>Worker</strong></p>

      {% if messages %}
      {% for message in messages %}
      {% if message.tags == 'error' %}
      <div class="message-popup">
        <div class="message-popup-icon">!</div>
        <div class="message-popup-text">{{ message }}</div>
      </div>
      {% endif %}
      {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'worker_signup' %}">
        {% csrf_token %}

        <div class="form-group">
          <label>Worker ID</label>
          <input
            type="text"
            name="user_id"
            placeholder="Enter your university Worker ID (e.g. E101)"
            required
          />
        </div>

        <!-- 🔴 THIS WAS THE PROBLEM → FIXED -->
        <div class="form-group">
          <label>Full Name</label>
          <input
            type="text"
            name="full_name"
            placeholder="Enter your full name"
            required
          />
        </div>

        <!-- ✅ SECURITY QUESTION DROPDOWN -->
        <div class="form-group">
          <label>Security Question</label>
          <select name="security_question" required>
            <option value="">Select a question</option>
            <option value="father_name">What is your father's name?</option>
          </select>
        </div>

        <!-- ✅ SECURITY ANSWER -->
        <div class="form-group">
          <label>Answer</label>
          <input
            type="text"
            name="security_answer"
            placeholder="Enter your answer"
            required
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="Create a password"
            required
          />
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input
            type="password"
            name="confirm_password"
            placeholder="Confirm your password"
            required
          />
        </div>

        <button type="submit" class="signup-btn">Sign Up as Worker</button>
      </form>

      <p class="footer-text" style="margin-top: 20px; text-align: center">
        Already have an account? <a href="{% url 'welcome_role' %}">Log in</a>
      </p>
    </div>
  </body>
</html>
