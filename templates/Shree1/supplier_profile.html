{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Settings | SHREE</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link
      rel="stylesheet"
      href="{% static 'Shree1/css/supplier_profile.css' %}"
    />
  </head>

  <body>
    <div class="container">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="logo-section">
          <div>
            <h2>SHREE</h2>
            <p>Smart Hostel System</p>
          </div>
        </div>

        <nav class="nav-menu">
          <a href="{% url 'supplier_dashboard' %}"" class="nav-item">Dashboard</a>
          <a href="#" class="nav-item active">Profile</a>
        </nav>
      </aside>

      <!-- MAIN -->
      <main class="main-content">

        <h1>Profile Settings</h1>
        <p class="subtitle">Manage your account information</p>

        <div class="profile-card">
          <!-- Messages -->
          {% if messages %} {% for message in messages %}
          <div class="alert">{{ message }}</div>
          {% endfor %} {% endif %}

          <form method="POST" id="profileForm">
            {% csrf_token %}

            <div class="form-grid">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="{{ full_name|default:'kutir' }}" disabled />
              </div>

              <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ email }}"  class="form-control" />
              </div>

              <div class="form-group">
                <label><i class="fa-solid fa-phone"></i> Phone Number</label>
                <input
                  type="tel"
                  name="phone"
                  value="{{ phone|default:'9343975395'  }}"
                  maxlength="10"
                  pattern="[1-9][0-9]{9}"
                  title="Phone number must be 10 digits and cannot start with 0"
                  class="form-control"
                  required
                />
              </div>

            </div>
            <br>
            <button type="submit" class="btn-primary">
              <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
          </form>
        </div>
      </main>
    </div>

    <script src="{% static 'Shree1/js/supplier_profile.js' %}"></script>
  </body>
</html>
