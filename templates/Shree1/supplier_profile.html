{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Settings | SHREE</title>
    <style>
      .logo-section {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
      }
      .logo-name {
        margin: 0;
        font-size: 19px;
        font-weight: 800;
        letter-spacing: 0.02em;
        color: #0f172a;
      }
      .brand-copy {
        max-width: 170px;
      }
      .brand-subtitle {
        margin: 4px 0 0;
        font-size: 10px;
        line-height: 1.35;
        color: #94a3b8;
      }
      .nav-item {
        font-size: 15px;
      }
    </style>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link
      rel="stylesheet"
      href="{% static 'Shree1/css/supplier_profile.css' %}"
    />
  </head>

  <body>
     <div class="container">
      <aside class="sidebar">
        <div class="logo-section">
          <img src="{% static 'Shree1/images/logo_img.jpeg' %}" alt="SHREE Logo" class="nav-logo-file" style="width: 50px; height: 50px; border-radius: 10px; object-fit: contain; flex-shrink: 0;" />
          <div class="brand-copy">
            <h2 class="logo-name">SHREE</h2>
            <p class="brand-subtitle">Smart Hostel Record & Employee Evaluation</p>
          </div>
        </div>

        <nav class="nav-menu">
          <a href="{% url 'supplier_dashboard' %}" class="nav-item">Dashboard</a>
          <a href="{% url 'supplier_profile' %}" class="nav-item active">Profile</a>
        </nav>
      </aside>

      <!-- MAIN -->
      <main class="main-content">

        <h1>Profile Settings</h1>
        <p class="subtitle">Manage your account information</p>

        <div class="profile-card">
          <!-- Messages -->
          {% if messages %} {% for message in messages %}
          <div class="alert">{{ message }}</div>
          {% endfor %} {% endif %}

          <form method="POST" id="profileForm">
            {% csrf_token %}

            <div class="form-grid">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="{{ full_name|default:'kutir' }}" disabled />
              </div>

              <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ email|default:'kutir@gmail.com' }}"  disabled />
              </div>

              <div class="form-group">
                <label><i class="fa-solid fa-phone"></i> Phone Number</label>
                <input
                  type="tel"
                  name="phone"
                  value="{{ phone|default:'9343975395'  }}"
                  maxlength="10"
                  pattern="[1-9][0-9]{9}"
                  title="Phone number must be 10 digits and cannot start with 0"
                  class="form-control"
                  disabled
                />
              </div>

            </div>
            <br>
            <button type="submit" class="btn-primary">
              <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
          </form>
        </div>
      </main>
    </div>

    <script src="{% static 'Shree1/js/supplier_profile.js' %}"></script>
  </body>
</html>
