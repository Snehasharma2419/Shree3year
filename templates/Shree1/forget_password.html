{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forget Password</title>
    <link
      rel="stylesheet"
      href="{% static 'Shree1/css/forget_password.css' %}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-container">
      <div class="form-card">
        <h2>Forget Password</h2>

        <form method="POST">
          {% csrf_token %}

          <div class="form-group">
            <label for="userId">User ID</label>
            <input
              type="text"
              id="userId"
              name="username"
              placeholder="Enter your User ID"
              required
            />
          </div>

          <div class="form-group">
            <label>Security Question</label>
            <select id="securityQuestion" required>
              <option value="">Select your question</option>
              <option>What is your father's name?</option>
            </select>
          </div>

          <div class="form-group">
            <label>Your Answer</label>
            <input
              type="text"
              id="securityAnswer"
              name="security_answer"
              placeholder="Enter your answer"
              required
            />
          </div>

          <div class="form-group">
            <label for="newPassword">Enter New Password</label>
            <input
              type="password"
              id="newPassword"
              name="new_password"
              placeholder="Create a new password"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Re-enter Password</label>
            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm your new password"
              required
            />
          </div>

          <button type="submit" class="submit-btn">Submit</button>
        </form>

        <div class="form-footer">
          <p>Remember your password? <a href="login.html">Log in</a></p>
        </div>
      </div>
    </div>

    <script src="{% static 'Shree1/js/forget_password.js' %}"></script>
  </body>
</html>
