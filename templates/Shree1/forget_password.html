{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forget Password</title>
    <link
      rel="stylesheet"
      href="{% static 'Shree1/css/forget_password.css' %}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .message-popup {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        margin-bottom: 18px;
        border-radius: 14px;
        border: 1px solid #fecaca;
        background: linear-gradient(180deg, #fff5f5 0%, #fee2e2 100%);
        box-shadow: 0 10px 24px rgba(220, 38, 38, 0.08);
        animation: popupSlideIn 0.25s ease-out;
      }
      .message-popup-icon {
        width: 34px;
        height: 34px;
        flex-shrink: 0;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #dc2626;
        color: white;
        font-weight: 700;
      }
      .message-popup-text {
        color: #991b1b;
        font-size: 0.95rem;
        line-height: 1.5;
        font-weight: 600;
      }
      .message-popup.success {
        border-color: #bbf7d0;
        background: linear-gradient(180deg, #f0fdf4 0%, #dcfce7 100%);
        box-shadow: 0 10px 24px rgba(22, 163, 74, 0.08);
      }
      .message-popup.success .message-popup-icon {
        background: #16a34a;
      }
      .message-popup.success .message-popup-text {
        color: #166534;
      }
      @keyframes popupSlideIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="form-card">
        <h2>Forget Password</h2>

        {% if messages %}
        {% for message in messages %}
        <div class="message-popup {% if message.tags == 'success' %}success{% endif %}">
          <div class="message-popup-icon">!</div>
          <div class="message-popup-text">{{ message }}</div>
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST" id="resetForm">
          {% csrf_token %}

          <div class="form-group">
            <label for="userId">User ID</label>
            <input
              type="text"
              id="userId"
              name="username"
              placeholder="Enter your User ID"
              required
            />
          </div>

          <div class="form-group">
            <label>Security Question</label>
            <select id="securityQuestion" name="security_question" required>
              <option value="">Select your question</option>
              <option value="father_name">What is your father's name?</option>
            </select>
          </div>

          <div class="form-group">
            <label>Your Answer</label>
            <input
              type="text"
              id="securityAnswer"
              name="security_answer"
              placeholder="Enter your answer"
              required
            />
          </div>

          <div class="form-group">
            <label for="newPassword">Enter New Password</label>
            <input
              type="password"
              id="newPassword"
              name="new_password"
              placeholder="Create a new password"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Re-enter Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirm_password"
              placeholder="Confirm your new password"
              required
            />
          </div>

          <button type="submit" class="submit-btn">Submit</button>
        </form>

        <div class="form-footer">
          <p>Remember your password? <a href="{% url 'welcome_role' %}">Log in</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
